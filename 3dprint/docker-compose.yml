services:
  bambuddy:
    container_name: bambuddy
    image: ghcr.io/maziggy/bambuddy:daily
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=DEBUG
    volumes:
      - ${CONFIG_ROOT}/bambuddy/data:/app/data
      - ${CONFIG_ROOT}/bambuddy/logs:/app/logs

  bambu-studio-api:
    container_name: bambu-studio-api
    build:
      context: https://github.com/maziggy/orca-slicer-api.git#bambuddy/profile-resolver
      dockerfile: Dockerfile.bambu-studio
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BAMBU_VERSION=02.06.00.51
    ports:
      - "3001:3000"
    volumes:
      - ${CONFIG_ROOT}/bambu-studio-api:/app/data/bambu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
