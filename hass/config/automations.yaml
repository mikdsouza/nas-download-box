- id: '1738033984586'
  alias: Low Battery Notifications & Actions
  description: ''
  use_blueprint:
    path: Blackshome/low-battery-notifications-and-actions.yaml
    input:
      include_time: time_enabled
      time: '12:00:00'
      weekday_options:
      - sun
      include_persistent_notification: enable_persistent_notification
      include_easy_notify: enable_easy_notify
      notify_device:
      - fc0a7391e6019c3a2d3638052f04dfd6
      notify_data: []
      exclude_sensors:
        entity_id:
        - sensor.adriana_orlands_iphone_battery_level
        - sensor.tab_s6_battery_level
        - sensor.sm_s921b_battery_level
