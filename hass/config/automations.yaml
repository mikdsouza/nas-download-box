- id: '1778819767094'
  alias: Turn on kitchen island working scene
  description: ''
  triggers:
  - domain: mqtt
    device_id: d7e5110eab4a66db60855e83b8ef10ba
    type: action
    subtype: 'on'
    metadata: {}
    trigger: device
  conditions:
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: light.kitchen_island
      attribute: brightness
      below: 250
    - condition: state
      entity_id: light.kitchen_island
      state:
      - 'off'
  actions:
  - action: scene.turn_on
    metadata: {}
    target:
      entity_id: scene.kitchen_island_working_scene
    data:
      transition: 0.5
  mode: single
