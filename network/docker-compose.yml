services:
  unifi-os-server:
    image: ghcr.io/lemker/unifi-os-server:latest
    container_name: unifi-os-server
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      - UOS_SYSTEM_IP=unifi.iammikhail.com
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ${CONFIG_ROOT}/unifi-os-server/persistent:/persistent
      - ${CONFIG_ROOT}/unifi-os-server/var-log:/var/log
      - ${CONFIG_ROOT}/unifi-os-server/data:/data
      - ${CONFIG_ROOT}/unifi-os-server/srv:/srv
      - ${CONFIG_ROOT}/unifi-os-server/var-lib-unifi:/var/lib/unifi
      - ${CONFIG_ROOT}/unifi-os-server/var-lib-mongodb:/var/lib/mongodb
      - ${CONFIG_ROOT}/unifi-os-server/etc-rabbitmq-ssl:/etc/rabbitmq/ssl
    ports:
      - 11443:443
      - 5005:5005
      - 9543:9543
      - 6789:6789
      - 8080:8080
      - 8443:8443
      - 8444:8444
      - 3478:3478/udp
      - 5514:5514/udp
      - 10003:10003/udp
      - 11084:11084
      - 5671:5671
      - 8880:8880
      - 8881:8881
      - 8882:8882
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.unifi.rule=Host(`unifi.iammikhail.com`)"
      - "traefik.http.routers.unifi.entrypoints=websecure"
      - "traefik.http.routers.unifi.tls.certresolver=cloudflare"
      - "traefik.http.services.unifi.loadbalancer.server.port=443"
      - "traefik.http.services.unifi.loadbalancer.server.scheme=https"
      - "traefik.http.services.unifi.loadbalancer.serverstransport=unifi-transport@file"
    networks:
      - default
      - proxy_net

networks:
  default:
    driver: bridge
  proxy_net:
    external: true
