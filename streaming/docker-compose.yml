services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=7081
      - TORRENTING_PORT=6881
    volumes:
      - /${CONFIG_ROOT}/qbittorrent:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - 7081:7081
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`downloads.iammikhail.com`) && PathPrefix(`/qbit`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=cloudflare"
      - "traefik.http.routers.qbittorrent.middlewares=qbit-slash,qbit-strip"
      - "traefik.http.middlewares.qbit-slash.redirectregex.regex=^(https?://[^/]+/qbit)$$"
      - "traefik.http.middlewares.qbit-slash.redirectregex.replacement=$${1}/"
      - "traefik.http.middlewares.qbit-strip.stripprefix.prefixes=/qbit/"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=7081"
    networks:
      - streaming_net
      - proxy_net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - 9696:9696
    restart: always
    links:
      - flaresolverr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`downloads.iammikhail.com`) && PathPrefix(`/prowlarr`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=cloudflare"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    networks:
      - streaming_net
      - proxy_net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
    ports:
      - "${PORT:-8191}:8191"
    restart: unless-stopped
    networks:
      - streaming_net
      - proxy_net

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr
    restart: always
    ports:
      - 8989:8989
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT}/sonarr:/config
      - ${MEDIA_ROOT}:/media
    links:
      - qbittorrent
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`downloads.iammikhail.com`) && PathPrefix(`/sonarr`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=cloudflare"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    networks:
      - streaming_net
      - proxy_net

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr
    restart: always
    ports:
      - 8686:8686
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT}/lidarr:/config
      - ${MEDIA_ROOT}:/media
    links:
      - qbittorrent
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`downloads.iammikhail.com`) && PathPrefix(`/lidarr`)"
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.tls.certresolver=cloudflare"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    networks:
      - streaming_net
      - proxy_net

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr
    restart: always
    ports:
      - 7878:7878
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT}/radarr:/config
      - ${MEDIA_ROOT}:/media
    links:
      - qbittorrent
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`downloads.iammikhail.com`) && PathPrefix(`/radarr`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    networks:
      - streaming_net
      - proxy_net

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    volumes:
      - ${CONFIG_ROOT}/calibre-web:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - 8083:8083
    restart: unless-stopped
    networks:
      - streaming_net
      - proxy_net

  jellyfin:
    image: linuxserver/jellyfin
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/jellyfin:/config
      - ${MEDIA_ROOT}/TV Shows:/data/tvshows
      - ${MEDIA_ROOT}/Movies:/data/movies
      - ${MEDIA_ROOT}/Music:/data/music
      - ${MEDIA_ROOT}:/media
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`downloads.iammikhail.com`) && PathPrefix(`/jellyfin`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    networks:
      - streaming_net
      - proxy_net

networks:
  streaming_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: dlbox0
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
  proxy_net:
    external: true
